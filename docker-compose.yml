services:
  # ---- PostgreSQL standalone ----
  postgres:
    image: postgres:16
    container_name: pg_standalone
    mem_limit: 512m
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: foursquaredb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # ---- Citus (coordinator + 2 workers) ----
  citus_coord:
    image: citusdata/citus:12.1
    container_name: citus_coord
    mem_limit: 512m
    shm_size: 256mb
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: foursquaredb
    ports:
      - "5433:5432"
    volumes:
      - citus_coord_data:/var/lib/postgresql/data
    labels:
      com.citusdata.role: "Coordinator"

  citus_worker1:
    image: citusdata/citus:12.1
    container_name: citus_worker1
    mem_limit: 512m
    shm_size: 256mb
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: foursquaredb
    volumes:
      - citus_w1_data:/var/lib/postgresql/data
    labels:
      com.citusdata.role: "Worker"

  citus_worker2:
    image: citusdata/citus:12.1
    container_name: citus_worker2
    mem_limit: 512m
    shm_size: 256mb
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: foursquaredb
    volumes:
      - citus_w2_data:/var/lib/postgresql/data
    labels:
      com.citusdata.role: "Worker"

  # ---- ScyllaDB cluster (3 nodes) ----
  scylla1:
    image: scylladb/scylla:5.4
    container_name: scylla1
    mem_limit: 768m
    ports:
      - "9042:9042"
    command: --seeds=scylla1 --smp 1 --memory 512M --overprovisioned 1
    volumes:
      - scylla1_data:/var/lib/scylla

  scylla2:
    image: scylladb/scylla:5.4
    container_name: scylla2
    mem_limit: 768m
    command: --seeds=scylla1 --smp 1 --memory 512M --overprovisioned 1
    volumes:
      - scylla2_data:/var/lib/scylla
    depends_on:
      - scylla1

  scylla3:
    image: scylladb/scylla:5.4
    container_name: scylla3
    mem_limit: 768m
    command: --seeds=scylla1 --smp 1 --memory 512M --overprovisioned 1
    volumes:
      - scylla3_data:/var/lib/scylla
    depends_on:
      - scylla1

  # ---- MongoDB replica set (3 nodes) ----
  mongo1:
    image: mongo:7
    container_name: mongo1
    mem_limit: 512m
    command: mongod --replSet rs0 --bind_ip_all --wiredTigerCacheSizeGB 0.25
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db

  mongo2:
    image: mongo:7
    container_name: mongo2
    mem_limit: 512m
    command: mongod --replSet rs0 --bind_ip_all --wiredTigerCacheSizeGB 0.25
    volumes:
      - mongo2_data:/data/db

  mongo3:
    image: mongo:7
    container_name: mongo3
    mem_limit: 512m
    command: mongod --replSet rs0 --bind_ip_all --wiredTigerCacheSizeGB 0.25
    volumes:
      - mongo3_data:/data/db

volumes:
  pg_data:
  citus_coord_data:
  citus_w1_data:
  citus_w2_data:
  scylla1_data:
  scylla2_data:
  scylla3_data:
  mongo1_data:
  mongo2_data:
  mongo3_data:
